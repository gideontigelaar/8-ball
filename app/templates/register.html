{% extends "base.html" %}

{% block title %}Register - 8-ball{% endblock %}

{% block content %}
<div class="col-md-4 mx-auto">
    <h1 class="mb-4">Register</h1>
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            <div class="alert alert-danger">{{ messages[0] }}</div>
        {% endif %}
    {% endwith %}
    <form method="POST">
        <input type="text" name="username" class="form-control mb-2" placeholder="Username" required>
        <input type="password" name="password" class="form-control mb-2" placeholder="Password" required>
        <input type="password" name="password_confirm" class="form-control mb-2" placeholder="Confirm password" required>
        <button type="submit" class="btn btn-primary w-100">Register</button>
    </form>
    <p class="mt-3">Already have an account? <a href="{{ url_for('login') }}">Login</a></p>
</div>
{% endblock %}
